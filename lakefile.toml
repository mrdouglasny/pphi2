name = "pphi2"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["Pphi2"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true

[[require]]
name = "reflection-positivity"
scope = "mrdouglasny"
git = "https://github.com/mrdouglasny/reflection-positivity.git"
rev = "2c74be3"

[[require]]
name = "GaussianField"
scope = "mrdouglasny"
git = "https://github.com/mrdouglasny/gaussian-field.git"
rev = "d63a285"

[[require]]
name = "bochner"
scope = "mrdouglasny"
git = "https://github.com/mrdouglasny/bochner.git"
rev = "34222bb"

[[require]]
name = "gaussian-hilbert"
scope = "mrdouglasny"
git = "https://github.com/mrdouglasny/gaussian-hilbert.git"
rev = "56ee09f"

[[require]]
name = "GibbsVariational"
scope = "mrdouglasny"
git = "https://github.com/mrdouglasny/gibbs-variational.git"
rev = "a7535d1"

[[lean_lib]]
name = "Pphi2"
needs = ["Common"]

[[lean_lib]]
name = "Common"
