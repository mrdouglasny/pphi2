# formalization.yaml — https://github.com/mathlib-initiative/formalization.yaml (v0.3)
# Describes the `layer-B2/piece-5` branch state of pphi2.
# Built tree (Pphi2.lean + Common): 0 sorries, 26 real `axiom` declarations
#   (24 public + 2 private). `scripts/count_axioms.sh` reports "28 raw" because
#   it also matches 2 docstring lines that begin with the word "axiom".
#   Legacy `ddj/` and parked `future/` are NOT part of the default build target.
version: "v0.3"

project:
  name: "pphi2"
  authors: ["Michael R. Douglas"]
  license: "Apache-2.0"

sources:
  - title: "The P(φ)₂ Euclidean (Quantum) Field Theory"
    authors: ["Barry Simon"]
    id: "ISBN:978-0-691-08144-3"
    type: "textbook"
    license: "proprietary"
  - title: "Quantum Physics: A Functional Integral Point of View"
    authors: ["James Glimm", "Arthur Jaffe"]
    id: "ISBN:978-0-387-96477-7"
    type: "textbook"
    license: "proprietary"
  - title: "Construction of quantum fields from Markoff fields"
    authors: ["Edward Nelson"]
    id: "10.1016/0022-1236(73)90024-4"
    type: "paper"
    license: "proprietary"
  - title: "The P(φ)₂ Euclidean quantum field theory as classical statistical mechanics"
    authors: ["Francesco Guerra", "Lon Rosen", "Barry Simon"]
    id: "10.2307/1970988"
    type: "paper"
    license: "proprietary"
  - title: "Axioms for Euclidean Green's functions"
    authors: ["Konrad Osterwalder", "Robert Schrader"]
    id: "10.1007/BF01645738"
    type: "paper"
    license: "proprietary"
    note: "OS reconstruction; the OS0–OS4 axiom system formalized as SatisfiesFullOS."

status:
  scope: >
    A mid-construction Lean 4 formalization of the P(Φ)₂ Euclidean QFT via the
    Glimm-Jaffe/Nelson lattice approach. The Osterwalder-Schrader axiom skeleton
    (OS0 analyticity, OS1 regularity, OS2 Euclidean invariance, OS3 reflection
    positivity, OS4 clustering, bundled as `Pphi2.SatisfiesFullOS`) is complete
    and the default target builds with 0 sorries. The headline existence theorem
    `Pphi2.pphi2_existence` (∃ μ on S'(ℝ²) satisfying all five OS axioms) is
    assembled from the lattice construction + continuum limit, but is CONDITIONAL
    on a set of named analytic axioms (uniform exponential moment bounds, uniform
    spectral gap, clustering-from-spectral-gap, rotation/Ward-identity restoration,
    propagator convergence, non-Gaussianity). These represent the standard but
    not-yet-formalized analytic hard cores of the construction. The build target
    is the `Pphi2` library (with `Common`); the legacy `ddj/` directory and the
    parked `future/CylinderContinuumLimit/` directory are NOT in the build and
    contain their own separate axioms/sorries that do not affect the main results.
  sorry_count: 0                 # in the built Pphi2/ + Common tree
  sorry_in_definitions: 0
  axioms:                        # 26 real axiom declarations in the built Pphi2/ tree (24 public + 2 private)
    - schwinger_agreement                                  # Bridge.lean:274
    - os2_from_phi4                                        # Bridge.lean:345
    - pphi2_nontriviality                                  # Main.lean:128
    - continuum_exponential_moment_bound                   # ContinuumLimit/AxiomInheritance.lean:123
    - canonical_continuumMeasure_cf_tendsto                # ContinuumLimit/AxiomInheritance.lean:327
    - continuum_exponential_clustering                     # ContinuumLimit/AxiomInheritance.lean:354
    - continuumLimit_nonGaussian                           # ContinuumLimit/Convergence.lean:256
    - asymInteracting_expMoment_volume_uniform             # AsymTorus/AsymContinuumLimit.lean:621
    - asymInteracting_mgf_gaussianDominated                # AsymTorus/AsymExpMomentDischarge.lean:127
    - asymInteractingVariance_le_freeVariance_lattice_Lt_uniform # AsymTorus/AsymExpMomentDischarge.lean:215
    - asymGroundStateRep_pos_ae                            # AsymTorus/AsymBridgeInstance.lean:81
    - asymTransferNormalized_contract                      # AsymTorus/AsymBridgeInstance.lean:128
    - asymGroundStateRep_eq_groundIsometry_one             # AsymTorus/AsymBridgeInstance.lean:140
    - asymPartition_ground_bound                           # AsymTorus/AsymBridgeInstance.lean:159
    - asymFinitePeriodicBridge_remainder_bound             # AsymTorus/AsymBridgeInstance.lean:174
    - asymGroundSemigroup_intertwines                      # AsymTorus/AsymBridgeInstance.lean:219
    - groundVariance_le_freeCovariance                     # AsymTorus/AsymB5bSingleSlice.lean:162
    - asymTorusInteracting_exponentialMomentBound          # AsymTorus/AsymTorusOS.lean:852 (private)
    - spectral_gap_uniform                                 # TransferMatrix/SpectralGap.lean:89
    - spectral_gap_lower_bound                             # TransferMatrix/SpectralGap.lean:100
    - rotation_cf_defect_polylog_bound                     # OSProofs/OS2_WardIdentity.lean:614
    - two_point_clustering_from_spectral_gap               # OSProofs/OS4_MassGap.lean:137
    - general_clustering_from_spectral_gap                 # OSProofs/OS4_MassGap.lean:160
    - gaussian_rp_cov_perfect_square                       # OSProofs/OS3_RP_Lattice.lean:648 (private)
    - nelson_exponential_estimate_master_bounded           # NelsonEstimate/PolynomialChaosBridge.lean:1321
    - latticeGreenBilinear_basis_tendsto_continuum         # GaussianContinuumLimit/PropagatorConvergence.lean:103
  main_results:
    - declaration: "Pphi2.pphi2_existence"
      file: "Pphi2/Main.lean"
      sorry_count: 0
      literature_dependencies:
        - statement: "existence of a probability measure on S'(ℝ²) satisfying the OS0–OS4 axioms for P(Φ)₂; conditional on the named uniform-estimate / spectral-gap / clustering / rotation-restoration axioms"
          source: "ISBN:978-0-691-08144-3"
        - statement: "lattice construction and continuum limit of the P(Φ)₂ measure"
          source: "ISBN:978-0-387-96477-7"
    - declaration: "Pphi2.pphi2_main"
      file: "Pphi2/Main.lean"
      sorry_count: 0
      literature_dependencies:
        - statement: "a P(Φ)₂ continuum limit measure satisfies the full OS axiom bundle"
          source: "10.1007/BF01645738"
    - declaration: "Pphi2.pphi2_nonGaussianity"
      file: "Pphi2/Main.lean"
      sorry_count: 0
      literature_dependencies:
        - statement: "non-Gaussianity: the connected four-point function is nonzero (rests on the `continuumLimit_nonGaussian` axiom)"
          source: "ISBN:978-0-691-08144-3"
    - declaration: "Pphi2.pphi2_nontrivial"
      file: "Pphi2/Main.lean"
      sorry_count: 0
