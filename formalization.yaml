      models: ["claude-opus-4-8"]
      framework: "Claude Code"
      prompting_notes: "Primary prover: cycle-by-cycle proving with compiler-guided repair; multi-repo (depends on reflection-positivity, gaussian-field, bochner, gaussian-hilbert, gibbs-variational)."
    - method: "agent"
      models: ["gpt-5-codex"]
      framework: "Codex"
      prompting_notes: "Auxiliary proving (per commit co-author trailers + docs)."
    - method: "other"
      models: ["gemini-3.1-pro"]
      framework: "Gemini (deep-think)"
      prompting_notes: "Cross-vetting of analytic estimates / axiom soundness (heavily referenced in status docs)."
  notes: "Default build target is the `Pphi2` library (+ `Common`). The legacy `ddj/` directory and the parked `future/CylinderContinuumLimit/` directory are NOT imported by Pphi2.lean and are excluded from the build; their axioms/sorries do not bear on the main results."

fidelity:
  divergences: >
    Active, mid-construction formalization: the Euclidean OS side is formalized,
    NOT the OS reconstruction step itself (no Minkowski Wightman theory, Hilbert
    space, or field operators are constructed; `massParameter_positive` is
    bookkeeping over the input bare mass, not a derived physical mass gap). The
    headline existence theorem is conditional on several named analytic axioms
    (uniform exponential moments, uniform spectral gap, clustering, rotation
    restoration, propagator/non-Gaussianity inputs) standing in for the
    not-yet-formalized cluster-expansion / correlation-inequality content. Per
    the project's own coherence analysis, `SatisfiesFullOS` is also satisfied by
    the free field, and non-triviality / non-Gaussianity are separate existence
    statements not yet conjoined with the OS measure into a single interacting
    measure; the "weak-coupling uniqueness" keystone that would glue them is not
    yet formalized. The lattice action uses the Glimm-Jaffe-aligned
    S = (aᵈ/2)⟨φ, M_a φ⟩ normalization.

review:
  status: "self-assessed"
  reviewers: []
  notes: "0 sorries on the active build (main, HEAD 9f2dcd6); 19 named axioms remain in the built Pphi2/ tree. The headline existence/OS results are literature-dependencies resting on those axioms, not unconditional proofs. See status.md and AXIOM_AUDIT.md."

alignment:
  namespace: "Pphi2"
  statements:
    - source: "ISBN:978-0-691-08144-3"
      lean: "Pphi2.pphi2_existence"
      module: "Pphi2.Main"
      status: "literature-dependency"
      note: "OS0–OS4 existence; conditional on the named analytic axioms (uniform moments, spectral gap, clustering, rotation restoration)."
    - source: "10.1007/BF01645738"
      lean: "Pphi2.SatisfiesFullOS"
      module: "Pphi2.OSAxioms"
      status: "proved"
      note: "the OS0–OS4 axiom bundle is fully formalized as a definition; `pphi2_main` shows a continuum limit satisfies it modulo the analytic axioms."
    - source: "ISBN:978-0-691-08144-3"
      lean: "Pphi2.pphi2_nonGaussianity"
      module: "Pphi2.Main"
      status: "literature-dependency"
      note: "rests on the `continuumLimit_nonGaussian` axiom (u₄ ≠ 0)."
    - source: "10.2307/1970988"
      lean: "Pphi2.pphi2_nontrivial"
      module: "Pphi2.Main"
      status: "literature-dependency"
      note: "rests on the `pphi2_nontriviality` axiom; correlation-inequality two-point lower bound."
    - source: "10.1016/0022-1236(73)90024-4"
      lean: "Pphi2.cylinderIso_OS_of_RP_OS2"
      module: "Pphi2.AsymTorus.AsymContinuumLimit"
      status: "literature-dependency"
      note: "cylinder OS0–OS3 assembly via the Nelson Markov-field / transfer-matrix route; conditional on RP, OS2-symmetry, and the uniform exp-moment axiom."
    - source: "ISBN:978-0-387-96477-7"
      lean: "Pphi2.spectral_gap_uniform"
      module: "Pphi2.TransferMatrix.SpectralGap"
      status: "literature-dependency"
      note: "uniform spectral gap of the transfer matrix; one of the genuine hard-core analytic axioms (GJ Ch. VI)."

